        Molestus</span><br /><span class="author"
        id="author--canis-molestus">Warwick Allen</span><br /><span class="date"
        id="date--canis-molestus">Saturday, 20 June 2026</span><br /></div>
    <br />
    <div class="poem-body">There once was a dog with a terrible
      habit<br />He&#39;d run off to chase chooks and many a
      rabbit<br />He&#39;d return at dawn<br />Face his master&#39;s
      scorn<br />But the next chance he&#39;d get, he&#39;d be right back at
      it<br /></div>
